name: Build and Test

on:
  push:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore *.slnx

      - name: Build
        run: dotnet build *.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test *.slnx --configuration Release --no-build --verbosity normal
